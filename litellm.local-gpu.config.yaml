# Optional Docker-backed local inference override for developer use.
# Keep the app-facing aliases stable:
# - game-chat
# - game-embedding
#
# This file is mounted by the default Compose stack and activated by
# `docker-compose.gpu.yml` or `scripts/start-dev.ps1 -AiStack local-gpu`.
#
# Recommended shape:
# - route `game-chat` to a local Ollama model
# - keep `game-embedding` on a small hosted model unless you are explicitly
#   validating a local embedding path too

model_list:
  - model_name: game-chat
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: game-embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
