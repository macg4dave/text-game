# Optional Docker-backed local inference override for developer use.
# Keep the app-facing aliases stable:
# - game-chat
# - game-embedding
#
# This file is mounted by the default Compose stack and can be activated
# manually when you want larger-model Docker GPU experiments beyond the
# default launcher path.
#
# The authoritative tier matrix lives in:
# - launcher/assets/local-gpu-profile-matrix.json
#
# active_profile_id: local-gpu-8gb
#
# The active block below is intentionally conservative:
# - default env values still resolve to the 8 GB tier
# - the launcher can now override the chat and embedding targets through
#   LITELLM_LOCAL_GPU_* env vars after selecting a matrix profile
# - keep the app-facing aliases stable while the selected upstream route changes

model_list:
  # profile_id: local-gpu-8gb
  - model_name: game-chat
    litellm_params:
      model: os.environ/LITELLM_LOCAL_GPU_CHAT_TARGET
      api_base: os.environ/LITELLM_LOCAL_GPU_CHAT_API_BASE

  # profile_id: local-gpu-8gb
  - model_name: game-embedding
    litellm_params:
      model: os.environ/LITELLM_LOCAL_GPU_EMBEDDING_TARGET
      api_key: os.environ/LITELLM_LOCAL_GPU_EMBEDDING_API_KEY
      api_base: os.environ/LITELLM_LOCAL_GPU_EMBEDDING_API_BASE

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# Manual swap reference blocks for later profile-selection work:
