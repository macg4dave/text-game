# LiteLLM proxy template for this repo.
#
# Keep these alias names stable unless a later backlog task explicitly changes
# the app contract:
# - game-chat
# - game-embedding
#
# Recommended baseline:
# - route both aliases to fast hosted models first
# - keep helper tasks and embeddings on hosted providers by default
# - if you later want a larger optional local-model path, change the upstream
#   target behind `game-chat` while leaving the alias name alone
# - the default Docker Compose stack mounts this file into the LiteLLM sidecar

model_list:
  # Default hosted route for the main turn path and small helper tasks.
  - model_name: game-chat
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Keep embeddings on a small hosted model unless you are intentionally
  # validating a different embedding path.
  - model_name: game-embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # Match this with LITELLM_API_KEY in the app's `.env` if you enable it.
  master_key: os.environ/LITELLM_MASTER_KEY

# Optional larger local-model route:
# - keep `model_name` values as `game-chat` and `game-embedding`
# - repoint only the upstream `model` target to the provider string supported
#   by your LiteLLM install
# - this repo now includes `litellm.local-gpu.config.yaml` as a ready-made
#   example for a Docker-backed Ollama route with the same stable aliases
