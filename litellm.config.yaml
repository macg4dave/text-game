# LiteLLM proxy template for this repo.
#
# Keep these alias names stable unless a later backlog task explicitly changes
# the app contract:
# - game-chat
# - game-embedding
#
# Recommended baseline for the current Docker smoke path:
# - route both aliases to a host-local Ollama instance first
# - keep the app-facing alias names stable
# - if you later want a hosted route again, change only the upstream targets
#   behind these aliases while leaving the alias names alone
# - the default Docker Compose stack mounts this file into the LiteLLM sidecar

model_list:
  # Default local route for the main turn path and small helper tasks.
  - model_name: game-chat
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: os.environ/OLLAMA_BASE_URL

  # Default local embedding route for a host-local Ollama smoke path.
  - model_name: game-embedding
    litellm_params:
      model: ollama/embeddinggemma
      api_base: os.environ/OLLAMA_BASE_URL

litellm_settings:
  # Match this with LITELLM_API_KEY in the app's `.env`.
  master_key: os.environ/LITELLM_MASTER_KEY

# Optional hosted or larger-model route:
# - keep `model_name` values as `game-chat` and `game-embedding`
# - repoint only the upstream `model` target to the provider string supported
#   by your LiteLLM install
# - this repo now includes `litellm.local-gpu.config.yaml` as a ready-made
#   example for a Docker-backed Ollama route with the same stable aliases
