services:
  ollama:
    image: "${OLLAMA_IMAGE:-ollama/ollama}"
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-24h}"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
      args:
        LITELLM_BASE_IMAGE: "${LITELLM_IMAGE:-docker.litellm.ai/berriai/litellm:main-stable}"
    image: text-game-litellm:latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--drop_params"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-sk-placeholder}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:-anything}"
      OLLAMA_BASE_URL: "${LITELLM_OLLAMA_BASE_URL:-http://ollama:11434}"
      LITELLM_LOCAL_GPU_PROFILE_ID: "${LITELLM_LOCAL_GPU_PROFILE_ID:-local-gpu-8gb}"
      LITELLM_LOCAL_GPU_CHAT_TARGET: "${LITELLM_LOCAL_GPU_CHAT_TARGET:-ollama_chat/gemma3:4b}"
      LITELLM_LOCAL_GPU_CHAT_API_BASE: "${LITELLM_LOCAL_GPU_CHAT_API_BASE:-http://ollama:11434}"
      LITELLM_LOCAL_GPU_EMBEDDING_TARGET: "${LITELLM_LOCAL_GPU_EMBEDDING_TARGET:-openai/text-embedding-3-small}"
      LITELLM_LOCAL_GPU_EMBEDDING_API_KEY: "${LITELLM_LOCAL_GPU_EMBEDDING_API_KEY:-sk-placeholder}"
      LITELLM_LOCAL_GPU_EMBEDDING_API_BASE: "${LITELLM_LOCAL_GPU_EMBEDDING_API_BASE:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.create_connection(('127.0.0.1', 4000), 3); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - game_data:/data
    environment:
      PORT: "${PORT:-3000}"
      GAME_DATA_DIR: "${GAME_DATA_DIR:-/data}"
      AI_PROFILE: "${AI_PROFILE:-local-gpu-small}"
      AI_PROVIDER: "${COMPOSE_AI_PROVIDER:-litellm}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_BASE_URL: "${AI_BASE_URL:-}"
      AI_CHAT_MODEL: "${AI_CHAT_MODEL:-gpt-4o-mini}"
      AI_EMBEDDING_MODEL: "${AI_EMBEDDING_MODEL:-text-embedding-3-small}"
      LITELLM_PROXY_URL: "${COMPOSE_LITELLM_PROXY_URL:-http://litellm:4000}"
      LITELLM_API_KEY: "${LITELLM_API_KEY:-anything}"
      LITELLM_CHAT_MODEL: "${LITELLM_CHAT_MODEL:-game-chat}"
      LITELLM_EMBEDDING_MODEL: "${LITELLM_EMBEDDING_MODEL:-game-embedding}"
      OLLAMA_BASE_URL: "${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434/v1}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY:-ollama}"
      OLLAMA_CHAT_MODEL: "${OLLAMA_CHAT_MODEL:-gemma3:4b}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL:-embeddinggemma}"
      LOCAL_GPU_REQUESTED_PROFILE: "${LOCAL_GPU_REQUESTED_PROFILE:-}"
      LOCAL_GPU_SELECTION_STATUS: "${LOCAL_GPU_SELECTION_STATUS:-}"
      LOCAL_GPU_SELECTION_SOURCE: "${LOCAL_GPU_SELECTION_SOURCE:-}"
      LOCAL_GPU_SELECTED_PROFILE_ID: "${LOCAL_GPU_SELECTED_PROFILE_ID:-}"
      LOCAL_GPU_SELECTED_PROFILE_LABEL: "${LOCAL_GPU_SELECTED_PROFILE_LABEL:-}"
      LOCAL_GPU_SELECTED_VERIFICATION_STATUS: "${LOCAL_GPU_SELECTED_VERIFICATION_STATUS:-}"
      LOCAL_GPU_DETECTED_VRAM_GB: "${LOCAL_GPU_DETECTED_VRAM_GB:-}"
      LOCAL_GPU_MANUAL_VRAM_GB: "${LOCAL_GPU_MANUAL_VRAM_GB:-}"
      LOCAL_GPU_SELECTED_CHAT_MODEL: "${LOCAL_GPU_SELECTED_CHAT_MODEL:-}"
      LOCAL_GPU_SELECTED_EMBEDDING_MODE: "${LOCAL_GPU_SELECTED_EMBEDDING_MODE:-}"
      LOCAL_GPU_SELECTED_EMBEDDING_MODEL: "${LOCAL_GPU_SELECTED_EMBEDDING_MODEL:-}"
      LOCAL_GPU_SELECTION_MESSAGE: "${LOCAL_GPU_SELECTION_MESSAGE:-}"
      LOCAL_GPU_SELECTION_NOTES: "${LOCAL_GPU_SELECTION_NOTES:-}"
      LOG_LEVEL: "${LOG_LEVEL:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "const port = process.env.PORT || '3000'; fetch('http://127.0.0.1:' + port + '/').then(async (response) => { const body = await response.text(); process.exit(response.ok && body.includes('Eclipse Signal') ? 0 : 1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  game_data:
  ollama_data:
