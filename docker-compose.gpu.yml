services:
  ollama:
    image: "${OLLAMA_IMAGE:-ollama/ollama}"
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-24h}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-all}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  litellm:
    command: ["--config", "/app/config.local-gpu.yaml", "--port", "4000"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: "${LITELLM_OLLAMA_BASE_URL:-http://ollama:11434}"

volumes:
  ollama_data:
